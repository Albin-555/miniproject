<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartGas | Access Portal</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo"></i> SmartGas</div>
            

            <form id="registerForm" >
                <h2>Create Account</h2>
                <div class="input-group"><i class="fa-solid fa-user"></i><input id="field" type="text" placeholder="Full Name" required></div>
                <div class="input-group"><i class="fa-solid fa-envelope"></i><input  type="email" placeholder="Email" required></div>
                <div class="input-group"><i class="fa-solid fa-phone"></i><input id="field" type="text" placeholder="Consumer ID" required></div>
                <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary">Sign Up</button>
                <p>Already have an account? <a href="log.html" >Login Here</a></p>
            </form>
        </div>
    </div>

</body>
</html>
