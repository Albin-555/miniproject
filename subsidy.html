                    <tr>
                        <td>Sept 15, 2025</td>
                        <td>#SUB-88154</td>
                        <td>$450.00</td>

                    </tr>
                    <tr>
                        <td>Aug 20, 2025</td>
                        <td>#SUB-77012</td>
                        <td>$450.00</td>

                </tbody>
            </table>
        </div>

        <div class="auth-footer">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
